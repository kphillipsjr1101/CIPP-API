# CIPP API Workflow Orca Test Fix Or Addition

## Action

Follow the orca-test-fix-or-addition workflow:
1. Identify ORCA test needing fix or addition
2. Edit or create the corresponding test file in Modules/CIPPTests/Public/Tests/ORCA/Identity/
3. Commit with message referencing ORCA test number

## Evidence

- Workflow detected from commit patterns
- Frequency: ~6x per month
- Files: Modules/CIPPTests/Public/Tests/ORCA/Identity/Invoke-CippTestORCA*.ps1

