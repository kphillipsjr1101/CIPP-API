# CIPP API Workflow Feature Development And Release Merge

## Action

Follow the feature-development-and-release-merge workflow:
1. Develop or tweak features in individual module files (e.g., Functions, Entrypoints, Config).
2. Update configuration or scheduler files as needed.
3. Update version tracking file (version_latest.txt).
4. Merge all related changes into a single commit (often with a message like 'Dev to hf').

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: Modules/CIPPCore/Public/Functions/*.ps1, Modules/CIPPCore/Public/Authentication/*.ps1, Modules/CIPPHTTP/Public/Entrypoints/HTTP Functions/**/*.ps1

