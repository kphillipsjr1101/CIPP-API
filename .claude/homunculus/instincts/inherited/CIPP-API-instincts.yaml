# CIPP API Workflow Add Or Update Standard

## Action

Follow the add-or-update-standard workflow:
1. Create or update a file in Modules/CIPPStandards/Public/Standards/Invoke-CIPPStandard*.ps1
2. If new, add entry to Config/standards.json
3. If new, add to documentation (e.g., .github/instructions/standards.instructions.md)
