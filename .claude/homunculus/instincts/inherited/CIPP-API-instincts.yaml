# CIPP API Workflow Db Cache Type And Handler Update

## Action

Follow the db-cache-type-and-handler-update workflow:
1. Edit Config/CIPPDBCacheTypes.json to add or update cache type
2. Edit or create handler script in Modules/CIPPDB/Public/DBCache/Set-CIPPDBCache*.ps1
3. Optionally, update Modules/CIPPCore/Public/Invoke-CIPPDBCacheCollection.ps1
4. Optionally, add or update related ORCA test

## Evidence

- Workflow detected from commit patterns
- Frequency: ~3x per month
- Files: Config/CIPPDBCacheTypes.json, Modules/CIPPDB/Public/DBCache/Set-CIPPDBCache*.ps1, Modules/CIPPCore/Public/Invoke-CIPPDBCacheCollection.ps1

