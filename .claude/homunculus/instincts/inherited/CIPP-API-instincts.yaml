# CIPP API Workflow Fix Or Enhance Existing Function

## Action

Follow the fix-or-enhance-existing-function workflow:
1. Identify the function needing a fix or enhancement.
2. Edit the corresponding .ps1 file to update logic, variable casing, or permissions.
3. Commit the changes with a descriptive message.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: Modules/CIPPStandards/Public/Standards/Invoke-CIPPStandardSPOVersionControl.ps1, Modules/CIPPHTTP/Public/Entrypoints/HTTP Functions/Email-Exchange/Tools/Invoke-ListMessageTrace.ps1

